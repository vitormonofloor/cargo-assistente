name: Cérebro Monofloor

on:
  schedule:
    # Agente Operacional - 07:30 BRT (10:30 UTC)
    - cron: '30 10 * * 1-5'
    # Cérebro Central - 08:00 BRT (11:00 UTC)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      agente:
        description: 'Qual agente executar?'
        required: true
        default: 'ambos'
        type: choice
        options:
          - operacional
          - cerebro
          - ambos

jobs:
  agente-operacional:
    if: github.event.schedule == '30 10 * * 1-5' || github.event.inputs.agente == 'operacional' || github.event.inputs.agente == 'ambos'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: pip install requests
      
      - name: Executar Agente Operacional
        env:
          PIPEFY_TOKEN: ${{ secrets.PIPEFY_TOKEN }}
        run: |
          cd cerebro_monofloor
          python agentes/agente_operacional.py
      
      - name: Upload dados
        uses: actions/upload-artifact@v4
        with:
          name: dados-operacionais
          path: cerebro_monofloor/outputs/

  cerebro-central:
    if: github.event.schedule == '0 11 * * 1-5' || github.event.inputs.agente == 'cerebro' || github.event.inputs.agente == 'ambos'
    runs-on: ubuntu-latest
    needs: [agente-operacional]
    if: always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download dados operacionais
        uses: actions/download-artifact@v4
        with:
          name: dados-operacionais
          path: cerebro_monofloor/outputs/
        continue-on-error: true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: pip install anthropic requests
      
      - name: Executar Cérebro Central
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd cerebro_monofloor
          python agentes/cerebro_central.py
      
      - name: Upload análise
        uses: actions/upload-artifact@v4
        with:
          name: analise-cerebro
          path: cerebro_monofloor/outputs/
